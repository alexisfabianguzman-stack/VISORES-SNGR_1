<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard GIS Regional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#0f1419; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background:linear-gradient(135deg,#667eea,#764ba2); color:white; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; flex-shrink: 0; }
        .header h1 { font-size:20px; }
        .top-filters { background: #1a202c; border-bottom: 1px solid #2d3748; padding: 10px 24px; display: flex; gap: 15px; align-items: center; flex-shrink: 0; }
        .top-filters .filter-group { display: flex; align-items: center; gap: 8px; flex: 1; }
        .top-filters .flabel { color: #a0aec0; font-size: 12px; text-transform: uppercase; font-weight: 600; }
        .top-filters .fsel { flex: 1; background:#2d3748; border:1px solid #4a5568; border-radius:6px; padding:8px 10px; color:#e2e8f0; font-size:13px; cursor:pointer; }
        .top-filters .fsel:disabled { opacity:.35; cursor:not-allowed; }
        .btn-clear { padding: 8px 16px; background:#4a5568; color:white; border:none; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; }
        .main { display:flex; flex: 1; overflow: hidden; }
        #map { flex:1; }
        .sidebar { width:320px; background:#1a202c; color:#e2e8f0; overflow-y:auto; border-left:1px solid #2d3748; display:flex; flex-direction:column; }
        .panel { padding:14px 16px; border-bottom:1px solid #2d3748; }
        .panel-title { font-size:10px; text-transform:uppercase; color:#718096; margin-bottom:10px; font-weight:700; }
        .stat-card { background:#2d3748; border-radius:7px; padding:11px 12px; margin-bottom:7px; border-left:3px solid #667eea; }
        .stat-card.orange { border-left-color:#f6ad55; }
        .stat-card.teal { border-left-color:#63b3ed; }
        .stat-lbl { font-size:10px; color:#718096; text-transform:uppercase; }
        .stat-val { font-size:26px; font-weight:700; color:#f6ad55; }
        .stat-card.teal .stat-val { color:#63b3ed; }
        .stat-detail { margin-top:8px; font-size:11px; color:#cbd5e0; max-height:200px; overflow-y:auto; line-height: 1.6; }
        .layer-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; font-size:13px; }
        .dot { width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:7px; }
        .sw { position:relative; width:38px; height:20px; }
        .sw input { opacity:0; width:0; height:0; }
        .sw .sl { position:absolute; inset:0; background:#4a5568; border-radius:20px; cursor:pointer; transition:.25s; }
        .sw .sl:before { content:''; position:absolute; width:14px; height:14px; left:3px; top:3px; background:white; border-radius:50%; transition:.25s; }
        .sw input:checked+.sl { background:#667eea; }
        .sw input:checked+.sl:before { transform:translateX(18px); }
    </style>
</head>
<body>

<div class="header">
    <h1>🗺️ Dashboard GIS Regional</h1>
    <p style="font-size: 12px; opacity: 0.8;">Base de datos integrada optimizada</p>
</div>

<div class="top-filters">
  <div class="filter-group"><label class="flabel">Provincia</label><select id="sel-prov" class="fsel" onchange="onProv()"><option value="">— Todas —</option></select></div>
  <div class="filter-group"><label class="flabel">Cantón</label><select id="sel-cant" class="fsel" disabled onchange="onCant()"><option value="">— Todos —</option></select></div>
  <div class="filter-group"><label class="flabel">Parroquia</label><select id="sel-parr" class="fsel" disabled onchange="onParr()"><option value="">— Todas —</option></select></div>
  <button class="btn-clear" onclick="clearSel()">✕ Limpiar filtros</button>
</div>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">📊 Estadísticas de la Zona</div>
      <div class="stat-card orange">
        <div class="stat-lbl">🏥 Asistencias Humanitarias</div>
        <div class="stat-val" id="cnt1">—</div>
        <div id="det1" class="stat-detail"></div>
      </div>
      <div class="stat-card teal">
        <div class="stat-lbl">⚠️ Eventos Adversos</div>
        <div class="stat-val" id="cnt2">—</div>
        <div id="det2" class="stat-detail"></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">👁 Control de Capas</div>
      <div class="layer-row"><span><span class="dot" style="background:#f6ad55"></span>Asistencias Humanitarias</span><label class="sw"><input type="checkbox" id="tog1" checked onchange="togglePts(1)"><span class="sl"></span></label></div>
      <div class="layer-row"><span><span class="dot" style="background:#63b3ed"></span>Eventos Adversos</span><label class="sw"><input type="checkbox" id="tog2" checked onchange="togglePts(2)"><span class="sl"></span></label></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
<script>
// BASES DE DATOS OFICIALES INCORPORADAS NATIVAMENTE (MUESTRA SIMULADA/PRE-PROCESADA PARA LEAFLET)
const D = {
    f1: {
        type: "FeatureCollection",
        features: [
            { type: "Feature", properties: { "Provincia": "PICHINCHA", "Cantón": "QUITO", "Parroquia": "IÑAQUITO", "Kits Alimentos": 120, "Kits Aseo": 45 }, geometry: { type: "Point", coordinates: [-78.486, -0.180] } },
            { type: "Feature", properties: { "Provincia": "GUAYAS", "Cantón": "GUAYAQUIL", "Parroquia": "TARQUI", "Kits Alimentos": 350, "Frazadas": 110 }, geometry: { type: "Point", coordinates: [-79.901, -2.139] } },
            { type: "Feature", properties: { "Provincia": "MANABI", "Cantón": "PORTOVIEJO", "Parroquia": "CRUCITA", "Kits Alimentos": 90, "Kits Aseo": 30 }, geometry: { type: "Point", coordinates: [-80.528, -0.862] } }
        ]
    },
    f2: {
        type: "FeatureCollection",
        features: [
            { type: "Feature", properties: { "Provincia": "PICHINCHA", "Cantón": "QUITO", "Parroquia": "IÑAQUITO", "Evento": "Inundación por lluvias", "Familias Afectadas": 12 }, geometry: { type: "Point", coordinates: [-78.482, -0.175] } },
            { type: "Feature", properties: { "Provincia": "GUAYAS", "Cantón": "GUAYAQUIL", "Parroquia": "TARQUI", "Evento": "Colapso estructural", "Familias Afectadas": 45 }, geometry: { type: "Point", coordinates: [-79.895, -2.145] } },
            { type: "Feature", properties: { "Provincia": "MANABI", "Cantón": "PORTOVIEJO", "Parroquia": "CRUCITA", "Evento": "Sismo - Daño Habitacional", "Familias Afectadas": 8 }, geometry: { type: "Point", coordinates: [-80.531, -0.858] } }
        ]
    }
};

let map, renderer, ptLayers={};
const S = { prov: '', cant: '', parr: '' };

function initDashboard() {
    renderer = L.canvas({ padding: 0.5 });
    map = L.map('map', { preferCanvas: true, renderer }).setView([-1.5, -78.0], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
    
    buildFilters();
    applyFilters();
}

function buildFilters() {
    const selProv = document.getElementById('sel-prov');
    const provs = new Set();
    [D.f1, D.f2].forEach(src => {
        src.features.forEach(f => { if(f.properties.Provincia) provs.add(f.properties.Provincia); });
    });
    Array.from(provs).sort().forEach(p => {
        const o = document.createElement('option'); o.value = o.textContent = p; selProv.appendChild(o);
    });
}

function onProv() {
    S.prov = document.getElementById('sel-prov').value; S.cant = ''; S.parr = '';
    const selCant = document.getElementById('sel-cant');
    selCant.innerHTML = '<option value="">— Todos —</option>';
    document.getElementById('sel-parr').innerHTML = '<option value="">— Todas —</option>';
    document.getElementById('sel-parr').disabled = true;

    if(S.prov) {
        const cantones = new Set();
        [D.f1, D.f2].forEach(src => {
            src.features.forEach(f => { if(f.properties.Provincia === S.prov && f.properties.Cantón) cantones.add(f.properties.Cantón); });
        });
        Array.from(cantones).sort().forEach(c => {
            const o = document.createElement('option'); o.value = o.textContent = c; selCant.appendChild(o);
        });
        selCant.disabled = false;
    } else {
        selCant.disabled = true;
    }
    applyFilters();
}

function onCant() {
    S.cant = document.getElementById('sel-cant').value; S.parr = '';
    const selParr = document.getElementById('sel-parr');
    selParr.innerHTML = '<option value="">— Todas —</option>';

    if(S.cant) {
        const parroquias = new Set();
        [D.f1, D.f2].forEach(src => {
            src.features.forEach(f => { if(f.properties.Cantón === S.cant && f.properties.Parroquia) parroquias.add(f.properties.Parroquia); });
        });
        Array.from(parroquias).sort().forEach(p => {
            const o = document.createElement('option'); o.value = o.textContent = p; selParr.appendChild(o);
        });
        selParr.disabled = false;
    } else {
        selParr.disabled = true;
    }
    applyFilters();
}

function onParr() {
    S.parr = document.getElementById('sel-parr').value;
    applyFilters();
}

function clearSel() {
    document.getElementById('sel-prov').value = '';
    onProv();
}

function filterFeatures(features) {
    return features.filter(f => {
        if (S.prov && f.properties.Provincia !== S.prov) return false;
        if (S.cant && f.properties.Cantón !== S.cant) return false;
        if (S.parr && f.properties.Parroquia !== S.parr) return false;
        return true;
    });
}

function applyFilters() {
    [1,2].forEach(n => { if (ptLayers[n]) map.removeLayer(ptLayers[n]); });
    drawPts(1,'#f6ad55','#c05621','🏥 Asistencia Humanitaria');
    drawPts(2,'#63b3ed','#2b6cb0','⚠️ Evento Adverso');
    
    // Zoom automático al grupo de puntos filtrados
    const allLayers = [];
    [1,2].forEach(n => { if(ptLayers[n] && map.hasLayer(ptLayers[n])) allLayers.push(ptLayers[n]); });
    if(allLayers.length > 0) {
        const group = L.featureGroup(allLayers);
        const bounds = group.getBounds();
        if(bounds.isValid()) map.asymmetricLayers ? null : map.flyToBounds(bounds.pad(0.2), { duration: 0.6 });
    }
}

function drawPts(n, fill, stroke, label) {
    const src = D['f' + n];
    const cntEl = document.getElementById('cnt'+n);
    const detEl = document.getElementById('det'+n);
    if (!src || !src.features) return;
    
    const validFeatures = filterFeatures(src.features);
    cntEl.textContent = validFeatures.length.toLocaleString();

    if (detEl) {
        if (n === 1) {
            let breakdown = {};
            validFeatures.forEach(f => {
                Object.entries(f.properties).forEach(([k,v]) => {
                    if (typeof v === 'number' && !['año', 'mes', 'dia', 'id', 'latitud', 'longitud'].includes(k.toLowerCase())) breakdown[k] = (breakdown[k] || 0) + v;
                });
            });
            let h = `<b style="color:#f6ad55">Total de ítems / kits entregados</b><br>`;
            Object.entries(breakdown).forEach(([k,v]) => h += `• ${k}: ${v}<br>`);
            detEl.innerHTML = Object.keys(breakdown).length > 0 ? h : 'Sin kits en esta zona.';
        } else {
            let breakdown = {};
            validFeatures.forEach(f => {
                let evt = f.properties.Evento || "Otro Evento";
                breakdown[evt] = (breakdown[evt] || 0) + 1;
            });
            let h = `<b style="color:#63b3ed">Tipos de evento:</b><br>`;
            Object.entries(breakdown).forEach(([k,v]) => h += `• ${k}: ${v}<br>`);
            detEl.innerHTML = Object.keys(breakdown).length > 0 ? h : 'Sin eventos en esta zona.';
        }
    }

    if(validFeatures.length === 0) return;

    ptLayers[n] = L.geoJSON({ type: "FeatureCollection", features: validFeatures }, {
        pointToLayer: (f,ll) => L.circleMarker(ll, { radius:7, fillColor:fill, color:stroke, weight:2, opacity:.9, fillOpacity:.75 }),
        onEachFeature: (f,layer) => {
            let h = `<div style="font-size:12px; max-width:250px;"><b style="color:${fill}">${label}</b><hr style="margin:4px 0">`;
            Object.entries(f.properties).forEach(([k,v]) => {
                if (v != null && v !== '') h += `<b>${k}:</b> ${v}<br>`;
            });
            layer.bindPopup(h + '</div>');
        }
    });

    if (document.getElementById('tog'+n).checked) ptLayers[n].addTo(map);
}

function togglePts(n) { if(ptLayers[n]) document.getElementById('tog'+n).checked ? map.addLayer(ptLayers[n]) : map.removeLayer(ptLayers[n]); }

window.addEventListener('DOMContentLoaded', initDashboard);
</script>
</body>
</html>
