<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard GIS Regional Real-Time</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#0f1419; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background:linear-gradient(135deg,#667eea,#764ba2); color:white; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; flex-shrink: 0; }
        .header h1 { font-size:20px; }
        .top-filters { background: #1a202c; border-bottom: 1px solid #2d3748; padding: 10px 24px; display: flex; gap: 15px; align-items: center; flex-shrink: 0; }
        .top-filters .filter-group { display: flex; align-items: center; gap: 8px; flex: 1; }
        .top-filters .flabel { color: #a0aec0; font-size: 12px; text-transform: uppercase; font-weight: 600; }
        .top-filters .fsel { flex: 1; background:#2d3748; border:1px solid #4a5568; border-radius:6px; padding:8px 10px; color:#e2e8f0; font-size:13px; cursor:pointer; }
        .top-filters .fsel:disabled { opacity:.35; cursor:not-allowed; }
        .btn-clear { padding: 8px 16px; background:#4a5568; color:white; border:none; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; }
        .main { display:flex; flex: 1; overflow: hidden; }
        #map { flex:1; }
        .sidebar { width:320px; background:#1a202c; color:#e2e8f0; overflow-y:auto; border-left:1px solid #2d3748; display:flex; flex-direction:column; }
        .panel { padding:14px 16px; border-bottom:1px solid #2d3748; }
        .panel-title { font-size:10px; text-transform:uppercase; color:#718096; margin-bottom:10px; font-weight:700; }
        .stat-card { background:#2d3748; border-radius:7px; padding:11px 12px; margin-bottom:7px; border-left:3px solid #667eea; }
        .stat-card.orange { border-left-color:#f6ad55; }
        .stat-card.teal { border-left-color:#63b3ed; }
        .stat-lbl { font-size:10px; color:#718096; text-transform:uppercase; }
        .stat-val { font-size:26px; font-weight:700; color:#f6ad55; }
        .stat-card.teal .stat-val { color:#63b3ed; }
        .stat-detail { margin-top:8px; font-size:11px; color:#cbd5e0; max-height:200px; overflow-y:auto; line-height: 1.6; }
        .layer-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; font-size:13px; }
        .dot { width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:7px; }
        .sw { position:relative; width:38px; height:20px; }
        .sw input { opacity:0; width:0; height:0; }
        .sw .sl { position:absolute; inset:0; background:#4a5568; border-radius:20px; cursor:pointer; transition:.25s; }
        .sw .sl:before { content:''; position:absolute; width:14px; height:14px; left:3px; top:3px; background:white; border-radius:50%; transition:.25s; }
        .sw input:checked+.sl { background:#667eea; }
        .sw input:checked+.sl:before { transform:translateX(18px); }
        #loading-screen { position:fixed; inset:0; background:#0f1419; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; padding: 20px; text-align: center; }
        .loader-bar { width: 200px; height: 4px; background: #2d3748; margin-top: 15px; border-radius: 2px; overflow: hidden; position: relative;}
        .loader-progress { width: 0%; height: 100%; background: #667eea; position: absolute; transition: width 0.4s; }
    </style>
</head>
<body>

<div id="loading-screen">
    <h2>🗺️ Cargando Dashboard GIS Regional</h2>
    <p id="loading-txt" style="color:#718096; margin-top:8px;">Bypassing CORS - Conectando con servidores de SGR y Límites Políticos...</p>
    <div class="loader-bar"><div id="loader-proc" class="loader-progress"></div></div>
</div>

<div class="header">
    <h1>🗺️ Dashboard GIS Regional</h1>
    <button class="btn-clear" style="background:rgba(255,255,255,0.2)" onclick="location.reload()">🔄 Actualizar Base de Datos</button>
</div>

<div class="top-filters">
  <div class="filter-group"><label class="flabel">Provincia</label><select id="sel-prov" class="fsel" onchange="onProv()"><option value="">— Todas —</option></select></div>
  <div class="filter-group"><label class="flabel">Cantón</label><select id="sel-cant" class="fsel" disabled onchange="onCant()"><option value="">— Todos —</option></select></div>
  <div class="filter-group"><label class="flabel">Parroquia</label><select id="sel-parr" class="fsel" disabled onchange="onParr()"><option value="">— Todas —</option></select></div>
  <button class="btn-clear" onclick="clearSel()">✕ Limpiar filtros</button>
</div>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">📊 Estadísticas de la Zona</div>
      <div class="stat-card orange">
        <div class="stat-lbl">🏥 Asistencias Humanitarias</div>
        <div class="stat-val" id="cnt1">—</div>
        <div id="det1" class="stat-detail"></div>
      </div>
      <div class="stat-card teal">
        <div class="stat-lbl">⚠️ Eventos Adversos</div>
        <div class="stat-val" id="cnt2">—</div>
        <div id="det2" class="stat-detail"></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">👁 Control de Capas</div>
      <div class="layer-row"><span><span class="dot" style="background:#f6ad55"></span>Asistencias Humanitarias</span><label class="sw"><input type="checkbox" id="tog1" checked onchange="togglePts(1)"><span class="sl"></span></label></div>
      <div class="layer-row"><span><span class="dot" style="background:#63b3ed"></span>Eventos Adversos</span><label class="sw"><input type="checkbox" id="tog2" checked onchange="togglePts(2)"><span class="sl"></span></label></div>
      <div class="layer-row"><span><span class="dot" style="background:#aaa"></span>Límites Provinciales</span><label class="sw"><input type="checkbox" id="tog-lim" checked onchange="toggleLim()"><span class="sl"></span></label></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.2/proj4.min.js"></script>
<script>
const D = { f1:null, f2:null, prov:null, cant:null, parr:null };
const S = { prov:'', cant:'', parr:'' };
let map, renderer, limLayer=null, hlLayer=null, ptLayers={};

proj4.defs('EPSG:32717', '+proj=utm +zone=17 +south +datum=WGS84 +units=m +no_defs');

function isUTM(coords) { return coords && coords.length >= 2 && (Math.abs(coords[0]) > 360 || Math.abs(coords[1]) > 360); }
function reprojectCoord(coord) { return proj4('EPSG:32717', 'EPSG:4326', [coord[0], coord[1]]); }
function reprojectRing(ring) { return ring.map(c => reprojectCoord(c)); }

function reprojectGeometry(geom) {
    if (!geom) return geom;
    const g = JSON.parse(JSON.stringify(geom));
    switch(g.type) {
        case 'Point': if (isUTM(g.coordinates)) g.coordinates = reprojectCoord(g.coordinates); break;
        case 'MultiPoint': if (g.coordinates.length > 0 && isUTM(g.coordinates[0])) g.coordinates = g.coordinates.map(c => reprojectCoord(c)); break;
        case 'LineString': if (g.coordinates.length > 0 && isUTM(g.coordinates[0])) g.coordinates = reprojectRing(g.coordinates); break;
        case 'MultiLineString':
        case 'Polygon': if (g.coordinates.length > 0 && g.coordinates[0].length > 0 && isUTM(g.coordinates[0][0])) g.coordinates = g.coordinates.map(ring => reprojectRing(ring)); break;
        case 'MultiPolygon': if (g.coordinates.length > 0 && g.coordinates[0].length > 0 && g.coordinates[0][0].length > 0 && isUTM(g.coordinates[0][0][0])) {
                g.coordinates = g.coordinates.map(poly => poly.map(ring => reprojectRing(ring)));
            } break;
    }
    return g;
}

function reprojectGeoJSON(geojson) {
    if (!geojson || !geojson.features) return geojson;
    geojson.features.forEach(f => { if(f.geometry) f.geometry = reprojectGeometry(f.geometry); });
    return geojson;
}

async function fetchViaProxy(targetUrl) {
    const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(targetUrl);
    const res = await fetch(proxyUrl);
    if(!res.ok) throw new Error("Error proxy");
    const wrapper = await res.json();
    let content = wrapper.contents;
    return (typeof content === 'string') ? JSON.parse(content) : content;
}

async function loadData() {
    const urls = {
        f1: 'https://simulacro.gestionderiesgos.gob.ec/api/public/get_geoJson_asistencias?api_key=da8628b5a3cdb0ba26c8c888831fe64ea1a9268b',
        f2: 'https://simulacro.gestionderiesgos.gob.ec/api/public/get_geoJson_afectaciones?api_key=da8628b5a3cdb0ba26c8c888831fe64ea1a9268b'
    };
    
    try {
        document.getElementById('loading-txt').textContent = "Cargando Asistencias Humanitarias...";
        document.getElementById('loader-proc').style.width = "30%";
        D.f1 = reprojectGeoJSON(await fetchViaProxy(urls.f1));
        
        document.getElementById('loading-txt').textContent = "Cargando Eventos Adversos...";
        document.getElementById('loader-proc').style.width = "60%";
        D.f2 = reprojectGeoJSON(await fetchViaProxy(urls.f2));

        document.getElementById('loading-txt').textContent = "Cargando Polígonos Provinciales...";
        document.getElementById('loader-proc').style.width = "90%";
        
        // Carga automática del archivo local de provincias en tu servidor
        const resProv = await fetch('provincias.geojson');
        if(resProv.ok) {
            D.prov = reprojectGeoJSON(await resProv.json());
        }

        document.getElementById('loader-proc').style.width = "100%";
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            initDashboard();
        }, 300);

    } catch(e) {
        console.error(e);
        document.getElementById('loading-screen').innerHTML = "<h2>❌ Error de Red</h2><p>No se pudieron descargar los datos espaciales. Refresca la página.</p>";
    }
}

function initDashboard() {
    renderer = L.canvas({ padding: 0.5 });
    map = L.map('map', { preferCanvas: true, renderer }).setView([-1.5, -78.0], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
    
    buildProvSelect();
    redrawLimits();
    applyFilters();
}

function redrawLimits() {
    if (limLayer) { map.removeLayer(limLayer); limLayer = null; }
    if (!D.prov) return;

    let geoSrc = D.prov;
    if (S.prov) {
        const feats = D.prov.features.filter(f => f.properties.DPA_DESPRO === S.prov);
        if (feats.length) geoSrc = { type:'FeatureCollection', features:feats };
    }

    limLayer = L.geoJSON(geoSrc, {
        renderer,
        style: { color: '#aaa', weight: 1.5, opacity: 0.7, fillOpacity: 0.04, fillColor: '#fff' },
        onEachFeature: (f, layer) => {
            const n = f.properties.DPA_DESPRO || '';
            if (n) layer.bindTooltip(n, { sticky: true, opacity: 0.85, direction: 'top' });
        }
    });
    if (document.getElementById('tog-lim').checked) limLayer.addTo(map);
}

function zoomToSelection() {
    if (hlLayer) { map.removeLayer(hlLayer); hlLayer = null; }
    if (!S.prov || !D.prov) return;

    const feature = D.prov.features.find(f => f.properties.DPA_DESPRO === S.prov);
    if (!feature) return;

    hlLayer = L.geoJSON(feature, { style: { color: '#f6ad55', weight: 3, opacity: 1, fillColor: '#f6ad55', fillOpacity: 0.1 } }).addTo(map);
    try { map.flyToBounds(hlLayer.getBounds().pad(0.08), { duration: 0.8 }); } catch(e) {}
}

function buildProvSelect() {
    const sel = document.getElementById('sel-prov');
    const names = new Set();
    
    if (D.prov) {
        D.prov.features.forEach(f => { if (f.properties.DPA_DESPRO) names.add(f.properties.DPA_DESPRO); });
    } else {
        ['f1', 'f2'].forEach(k => {
            if (D[k]) D[k].features.forEach(f => { if (f.properties.Provincia) names.add(f.properties.Provincia); });
        });
    }
    
    sel.innerHTML = '<option value="">— Todas —</option>';
    Array.from(names).sort().forEach(v => {
        const o = document.createElement('option'); o.value = o.textContent = v; sel.appendChild(o);
    });
}

function onProv() {
    S.prov = document.getElementById('sel-prov').value; S.cant = ''; S.parr = '';
    redrawLimits(); 
    zoomToSelection(); 
    applyFilters();
}

function onCant() { applyFilters(); }
function onParr() { applyFilters(); }

function clearSel() {
    S.prov = S.cant = S.parr = '';
    document.getElementById('sel-prov').value = '';
    if (hlLayer) { map.removeLayer(hlLayer); hlLayer = null; }
    redrawLimits(); applyFilters();
    map.flyTo([-1.5, -78.0], 7, { duration: 0.8 });
}

function isExcluded(k) {
    const kl = k.toLowerCase().trim();
    return ['año', 'mes', 'dia', 'día', 'zona', 'mes de entrega', 'secuencianacional', 'secuenciaprovincial', 'latitud', 'longitud', 'id', 'objectid'].includes(kl) || kl.includes('shape');
}

function applyFilters() {
    if (!map) return;
    [1,2].forEach(n => { if (ptLayers[n]) { map.removeLayer(ptLayers[n]); ptLayers[n]=null; } });
    
    // Filtrado espacial mediante Turf.js utilizando el polígono de la provincia activa
    let poly = null;
    if (S.prov && D.prov) {
        poly = D.prov.features.find(f => f.properties.DPA_DESPRO === S.prov);
    }

    drawPts(1, '#f6ad55', '#c05621', '🏥 Asistencia Humanitaria', poly);
    drawPts(2, '#63b3ed', '#2b6cb0', '⚠️ Evento Adverso', poly);
}

function inPoly(coords, poly) {
    if (!poly) return true;
    const pt = turf.point(coords);
    try { return turf.booleanPointInPolygon(pt, poly); } catch(e) { return false; }
}

function drawPts(n, fill, stroke, label, poly) {
    const src = D['f' + n];
    const cntEl = document.getElementById('cnt'+n);
    const detEl = document.getElementById('det'+n);
    if (!src || !src.features) return;
    
    const feats = src.features.filter(f => f.geometry && f.geometry.type==='Point' && inPoly(f.geometry.coordinates, poly));
    cntEl.textContent = feats.length.toLocaleString();

    if (detEl) {
        if (n === 1) {
            let breakdown = {};
            feats.forEach(f => {
                for (let k in f.properties) {
                    let v = f.properties[k];
                    if (typeof v === 'number' && v > 0 && !isExcluded(k)) breakdown[k] = (breakdown[k] || 0) + v;
                }
            });
            let h = `<b style="color:#f6ad55">Total de ítems / kits</b><br>`;
            for(let k in breakdown) h += `• ${k}: ${breakdown[k]}<br>`;
            detEl.innerHTML = Object.keys(breakdown).length > 0 ? h : 'Sin registros.';
        } else {
            let breakdown = {};
            feats.forEach(f => {
                let evtKey = Object.keys(f.properties).find(k => k.toLowerCase().includes('evento'));
                let evt = evtKey && f.properties[evtKey] ? f.properties[evtKey] : null;
                if(evt) breakdown[evt] = (breakdown[evt] || 0) + 1;
            });
            let h = `<b style="color:#63b3ed">Tipos de evento:</b><br>`;
            for(let k in breakdown) h += `• ${k}: ${breakdown[k]}<br>`;
            detEl.innerHTML = Object.keys(breakdown).length > 0 ? h : 'Sin registros.';
        }
    }

    if (!feats.length) return;
    ptLayers[n] = L.geoJSON({type:'FeatureCollection',features:feats}, {
        renderer,
        pointToLayer:(f,ll)=>L.circleMarker(ll,{radius:7,fillColor:fill,color:stroke,weight:2,opacity:.9,fillOpacity:.75}),
        onEachFeature:(f,layer)=>{
            let h='<div style="font-size:12px;max-width:260px;max-height:220px;overflow-y:auto;"><b style="color:'+fill+'">'+label+'</b><hr style="margin:4px 0">';
            Object.entries(f.properties).forEach(([k,v])=>{ if(v != null && v !== '' && !isExcluded(k)) h+='<b>'+k+':</b> '+v+'<br>'; });
            layer.bindPopup(h+'</div>');
        }
    });
    if (document.getElementById('tog'+n).checked) ptLayers[n].addTo(map);
}

function togglePts(n) { if(!ptLayers[n])return; document.getElementById('tog'+n).checked?map.addLayer(ptLayers[n]):map.removeLayer(ptLayers[n]); }
function toggleLim() { if(!limLayer)return; document.getElementById('tog-lim').checked?map.addLayer(limLayer):map.removeLayer(limLayer); }
</script>
</body>
</html>
